<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Sean O'Brien (L)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-page {
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 24px 96px;
      animation: fadeIn 0.4s ease both;
    }
    .contact-page h1 {
      font-family: 'EB Garamond', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }
    .contact-page p.placeholder {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #bbb;
      border-left: 2px solid #e8e5e0;
      padding-left: 20px;
    }
    .contact-links { display: flex; flex-direction: column; gap: 16px; }
    .contact-links a {
      font-family: 'EB Garamond', serif;
      font-size: 1.4rem;
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #e8e5e0;
      padding-bottom: 16px;
      transition: color 0.2s;
    }
    .contact-links a:hover { color: #999; }
  </style>
</head>

  <header>
    <a href="index.html" class="logo">Sean O'Brien (L)</a>

  </div>
